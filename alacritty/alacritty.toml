[window]
dimensions = { columns = 100, lines = 28 }

padding = { x = 10, y = 8 }

opacity = 0.99

decorations = "none"

blur = true
dynamic_padding = true


[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font", style = "Bold Italic" }
size = 10


[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[cursor]
style = { shape = "Beam", blinking = "Always" }

blink_interval = 500
blink_timeout = 0
unfocused_hollow = false

[shell]
program = "/usr/bin/zsh"
args = ["-l"]

# Catppuccin Mocha

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#cdd6f4"
background = "#181825"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[colors.dim]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[keyboard]
bindings = [
    { key = "C", mods = "Shift|Control", action = "Copy" },
    { key = "V", mods = "Shift|Control", action = "Paste" },
    { key = "F", mods = "Control", action = "SearchForward" },
    { key = "N", mods = "Control", action = "CreateNewWindow" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
    { key = "Key0", mods = "Control", action = "ResetFontSize" },
    { key = "Return", mods = "Control", action = "ToggleFullscreen" },
]
