#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Transparency
#################################

inactive-opacity = 0.95;
active-opacity = 1.0;

frame-opacity = 1.0;

#################################
# Blur
#################################

blur-method = "dual_kawase";
blur-strength = 7;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.35;

shadow-offset-x = -8;
shadow-offset-y = -8;

#################################
# Rounded corners
#################################

corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Fading
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
# Exclusions
#################################

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Performance
#################################

use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
