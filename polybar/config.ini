include-file = ~/.config/polybar/polybar/themes/mocha.ini

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 主屏幕（笔记本 DP-0）
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/main]
monitor = DP-0

width = 100%
height = 32

background = #AA24273a
foreground = ${colors.text}

radius = 12

line-size = 0
border-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = "FiraCode Nerd Font:size=10"
font-1 = "JetBrainsMono Nerd Font:size=10"
font-2 = "Noto Sans CJK SC:size=10"

modules-left = i3 xwindow
modules-center = playerctl
modules-right = filesystem wlan cpu memory pulseaudio bluetooth battery date

tray-position = right
tray-padding = 4

wm-restack = i3
enable-ipc = true

dpi = 96

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 外接显示器（HDMI-0）
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/hdmi]
monitor = HDMI-0

width = 100%
height = 32

background = #AA24273a
foreground = ${colors.text}

radius = 12

line-size = 0
border-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = "FiraCode Nerd Font:size=10"
font-1 = "JetBrainsMono Nerd Font:size=10"
font-2 = "Noto Sans CJK SC:size=10"

modules-left = i3 xwindow
modules-center = playerctl
modules-right = filesystem wlan cpu memory pulseaudio date

wm-restack = i3
enable-ipc = true

dpi = 96

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; i3 Workspaces
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/i3]
type = internal/i3

pin-workspaces = true
enable-click = true
enable-scroll = true

label-focused = %name%
label-focused-background = ${colors.surface0}
label-focused-foreground = ${colors.mauve}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.crust}
label-urgent-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 当前窗口
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;



;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 音乐播放器
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/playerctl]
type = custom/script

exec = playerctl metadata --format '󰎆 {{ artist }} - {{ title }}' 2>/dev/null

interval = 2

format-foreground = ${colors.green}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 日期
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date

interval = 1

date = 󰃭 %Y-%m-%d
time = 󰥔 %H:%M

label = %date% %time%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CPU
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = internal/cpu

interval = 2

format-prefix = " "
format-prefix-foreground = ${colors.peach}

label = %percentage%%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 内存
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = internal/memory

interval = 2

format-prefix = "󰍛 "
format-prefix-foreground = ${colors.blue}

label = %percentage_used%%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 音量
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.mauve}

label-volume = %percentage%%

label-muted = 󰝟 muted
label-muted-foreground = ${colors.red}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WiFi
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/wlan]
type = internal/network

interface-type = wireless

interval = 3

format-connected = 󰖩  <label-connected>
label-connected = %essid%

format-disconnected = 󰖪 disconnected
format-disconnected-foreground = ${colors.red}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 蓝牙
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/bluetooth]
type = custom/script

exec = bluetoothctl show | grep "Powered: yes" >/dev/null && echo "󰂯 ON" || echo "󰂲 OFF"

interval = 5

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 电池
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 98

poll-interval = 5

format-charging = 󰂄 <label-charging>
format-discharging = 󰁹 <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; 磁盘
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/filesystem]
type = internal/fs

interval = 25

mount-0 = /

label-mounted = 󰋊 %percentage_used%%
label-unmounted = not mounted
